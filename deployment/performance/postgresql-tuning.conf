# PostgreSQL Performance Tuning for HCX Egypt
# Optimized for production workload with high transaction volume

# Memory Configuration
shared_buffers = 4GB                    # 25% of total RAM (assuming 16GB)
effective_cache_size = 12GB             # 75% of total RAM
maintenance_work_mem = 1GB              # For VACUUM, CREATE INDEX
work_mem = 64MB                         # Per query operation
wal_buffers = 16MB                      # WAL buffer size

# Query Planner
random_page_cost = 1.1                  # SSD-optimized
effective_io_concurrency = 200          # SSD can handle many concurrent I/O
default_statistics_target = 100         # Better query planning

# Write-Ahead Log (WAL)
wal_level = replica                     # Enable replication
max_wal_size = 4GB                      # Maximum WAL size before checkpoint
min_wal_size = 1GB                      # Minimum WAL size
checkpoint_completion_target = 0.9      # Spread checkpoints over 90% of interval
wal_compression = on                    # Compress WAL data

# Replication
max_wal_senders = 10                    # Maximum replication connections
wal_keep_size = 1GB                     # Keep WAL for replicas
hot_standby = on                        # Enable read queries on standby
hot_standby_feedback = on               # Prevent query conflicts

# Connection Pooling
max_connections = 200                   # Maximum concurrent connections
superuser_reserved_connections = 5      # Reserved for superuser

# Parallel Query Execution
max_parallel_workers_per_gather = 4     # Parallel workers per query
max_parallel_workers = 8                # Total parallel workers
max_parallel_maintenance_workers = 4    # For CREATE INDEX, VACUUM

# Autovacuum (Critical for performance)
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 10s                # Check every 10 seconds
autovacuum_vacuum_threshold = 50        # Minimum rows before vacuum
autovacuum_analyze_threshold = 50       # Minimum rows before analyze
autovacuum_vacuum_scale_factor = 0.1    # Vacuum when 10% of rows changed
autovacuum_analyze_scale_factor = 0.05  # Analyze when 5% of rows changed

# Logging for Performance Analysis
log_min_duration_statement = 1000       # Log queries slower than 1 second
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0                      # Log all temp files
log_autovacuum_min_duration = 0         # Log all autovacuum actions

# Statement Timeout
statement_timeout = 30000               # 30 seconds (prevent long-running queries)
idle_in_transaction_session_timeout = 60000  # 60 seconds

# Locale and Encoding (Egypt-specific)
lc_messages = 'en_US.UTF-8'
lc_monetary = 'ar_EG.UTF-8'             # Egyptian Pound formatting
lc_numeric = 'ar_EG.UTF-8'
lc_time = 'ar_EG.UTF-8'
default_text_search_config = 'pg_catalog.english'
timezone = 'Africa/Cairo'

# SSL/TLS Configuration
ssl = on
ssl_cert_file = '/var/lib/postgresql/data/server.crt'
ssl_key_file = '/var/lib/postgresql/data/server.key'
ssl_ca_file = '/var/lib/postgresql/data/ca.crt'
ssl_min_protocol_version = 'TLSv1.2'
ssl_prefer_server_ciphers = on
ssl_ciphers = 'HIGH:MEDIUM:+3DES:!aNULL'

# Encryption at Rest
# Note: This requires pgcrypto extension and application-level encryption
# or full disk encryption at the OS/storage level
