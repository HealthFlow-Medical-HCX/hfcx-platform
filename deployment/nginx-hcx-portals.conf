# HCX Egypt - Nginx Configuration for HTTPS Portals
# This configuration provides HTTPS access to all frontend portals and backend services

# Upstream definitions for backend services
upstream hcx_api_gateway {
    server localhost:8081;
}

upstream hcx_api {
    server localhost:8082;
}

upstream hcx_provider_service {
    server localhost:8083;
}

upstream keycloak {
    server localhost:8080;
}

# Upstream definitions for frontend portals
upstream beneficiary_portal {
    server localhost:3001;
}

upstream opd_portal {
    server localhost:3002;
}

upstream bsp_portal {
    server localhost:3003;
}

upstream mock_payer_app {
    server localhost:3004;
}

# HTTP to HTTPS redirect
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# Main HTTPS server - API Gateway
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name healthflow.gov.eg sandbox.healthflow.gov.eg;

    ssl_certificate /etc/nginx/ssl/hcx-egypt.crt;
    ssl_certificate_key /etc/nginx/ssl/hcx-egypt.key;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API Gateway
    location /api/ {
        proxy_pass http://hcx_api_gateway/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # HCX API direct access
    location /hcx-api/ {
        proxy_pass http://hcx_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Provider Service
    location /provider/ {
        proxy_pass http://hcx_provider_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Keycloak
    location /auth/ {
        proxy_pass http://keycloak/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Default location
    location / {
        return 200 "HCX Egypt Platform - Use specific portal URLs\n\nAvailable portals:\n- https://healthflow.gov.eg/beneficiary/ - Beneficiary Portal\n- https://healthflow.gov.eg/opd/ - OPD Portal\n- https://healthflow.gov.eg/bsp/ - BSP Portal\n- https://healthflow.gov.eg/payer/ - Mock Payer App\n\nBackend services:\n- https://healthflow.gov.eg/api/ - API Gateway\n- https://healthflow.gov.eg/auth/ - Keycloak\n";
        add_header Content-Type text/plain;
    }
}

