sonar.organization=healthflow
sonar.projectKey=HealthFlow-Medical-HCX_hfcx-platform
sonar.host.url=https://sonarcloud.io

# S2077 (SQL Injection / dynamic SQL): elevate to BLOCKER so any regression
# fails the SonarCloud quality gate. Do NOT add this rule to the exclusion
# list — every SQL site that builds a query via String.format/concatenation
# must instead use PreparedStatement with parameter binding (see
# org.healthflow.common.utils.TableNames for the table-identifier
# allow-list helper).
#
# Originally enforced for hcx-pipeline-jobs/ + hcx-scheduler-jobs/ in
# Gap 5 v1.2. Extended to hcx-apis/ in Gap V2 v1.4 after a cross-review
# (the Manus second-opinion pass) found four missed sites in
# NotificationService.java — including a filter-append loop that
# concatenated user-controlled values with single-quote interpolation.
# All four sites are now PreparedStatement-bound; this rule keeps them
# that way.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S2077
sonar.issue.ignore.multicriteria.e1.severity=BLOCKER
