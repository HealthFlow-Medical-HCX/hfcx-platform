# ELK Stack Configuration for HCX Egypt
# Centralized logging with Elasticsearch, Logstash, and Kibana

---
# Elasticsearch StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: hcx-egypt-prod
spec:
  serviceName: elasticsearch
  replicas: 3
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      initContainers:
        - name: increase-vm-max-map
          image: busybox
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
          env:
            - name: cluster.name
              value: "hcx-egypt-logs"
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: discovery.seed_hosts
              value: "elasticsearch-0.elasticsearch,elasticsearch-1.elasticsearch,elasticsearch-2.elasticsearch"
            - name: cluster.initial_master_nodes
              value: "elasticsearch-0,elasticsearch-1,elasticsearch-2"
            - name: ES_JAVA_OPTS
              value: "-Xms2g -Xmx2g"
            - name: xpack.security.enabled
              value: "true"
            - name: xpack.security.transport.ssl.enabled
              value: "true"
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials
                  key: password
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
          resources:
            requests:
              cpu: 1
              memory: 4Gi
            limits:
              cpu: 2
              memory: 8Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 100Gi

---
# Logstash Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: hcx-egypt-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.10.0
          ports:
            - containerPort: 5044
              name: beats
            - containerPort: 9600
              name: http
          env:
            - name: LS_JAVA_OPTS
              value: "-Xmx1g -Xms1g"
          volumeMounts:
            - name: config
              mountPath: /usr/share/logstash/pipeline
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 1
              memory: 4Gi
      volumes:
        - name: config
          configMap:
            name: logstash-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: hcx-egypt-prod
data:
  logstash.conf: |
    input {
      beats {
        port => 5044
      }
      
      # Kafka input for application logs
      kafka {
        bootstrap_servers => "kafka:9092"
        topics => ["hcx-logs"]
        codec => json
        group_id => "logstash-consumer"
      }
    }
    
    filter {
      # Parse JSON logs
      if [message] =~ /^\{.*\}$/ {
        json {
          source => "message"
        }
      }
      
      # Add geoip for Egyptian IP addresses
      geoip {
        source => "client_ip"
        database => "/usr/share/logstash/geoip/GeoLite2-City.mmdb"
      }
      
      # Parse timestamps
      date {
        match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss"]
        target => "@timestamp"
      }
      
      # Enrich with Egyptian context
      mutate {
        add_field => {
          "country" => "Egypt"
          "timezone" => "Africa/Cairo"
          "deployment" => "hcx-egypt-prod"
        }
      }
      
      # Classify log levels
      if [level] == "ERROR" or [level] == "FATAL" {
        mutate {
          add_tag => ["alert"]
        }
      }
      
      # Extract transaction IDs for correlation
      if [message] =~ /transaction_id/ {
        grok {
          match => { "message" => "transaction_id=%{UUID:transaction_id}" }
        }
      }
    }
    
    output {
      elasticsearch {
        hosts => ["https://elasticsearch:9200"]
        user => "${ES_USERNAME}"
        password => "${ES_PASSWORD}"
        index => "hcx-logs-%{+YYYY.MM.dd}"
        ssl => true
        ssl_certificate_verification => true
      }
      
      # Send critical errors to alerting system
      if "alert" in [tags] {
        http {
          url => "https://alertmanager:9093/api/v1/alerts"
          http_method => "post"
          format => "json"
        }
      }
    }

---
# Kibana Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: hcx-egypt-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.10.0
          env:
            - name: ELASTICSEARCH_HOSTS
              value: "https://elasticsearch:9200"
            - name: ELASTICSEARCH_USERNAME
              value: "kibana_system"
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials
                  key: kibana_password
            - name: SERVER_NAME
              value: "kibana.healthflow.eg"
            - name: I18N_LOCALE
              value: "en"  # Can be changed to "ar" for Arabic
          ports:
            - containerPort: 5601
              name: http
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1
              memory: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: hcx-egypt-prod
spec:
  selector:
    app: kibana
  ports:
    - port: 5601
      targetPort: 5601
  type: LoadBalancer

---
# P0-8 — Index Lifecycle Management policy for the audit index.
# Egyptian PDPL Article 9 expects a long audit-trail with documented
# deletion at end-of-retention. The actual phase durations are POLICY
# decisions; see compliance/DPIA-HCX-Egypt-v1.md §6 for the values
# legal/compliance must set. Until those are set, this manifest is
# inactive (the policy is defined but not bound to the index template).
apiVersion: v1
kind: ConfigMap
metadata:
  name: hcx-audit-ilm-policy
  namespace: hcx-egypt-prod
data:
  hcx-audit-ilm-policy.json: |
    {
      "policy": {
        "phases": {
          "hot": {
            "actions": {
              "rollover": {
                "max_age":  "TODO_DPIA_SECTION_6_HOT_DAYS",
                "max_size": "50gb"
              },
              "set_priority": { "priority": 100 }
            }
          },
          "warm": {
            "min_age": "TODO_DPIA_SECTION_6_WARM_AFTER_DAYS",
            "actions": {
              "shrink":       { "number_of_shards": 1 },
              "forcemerge":   { "max_num_segments": 1 },
              "set_priority": { "priority": 50 }
            }
          },
          "cold": {
            "min_age": "TODO_DPIA_SECTION_6_COLD_AFTER_DAYS",
            "actions": {
              "set_priority": { "priority": 0 }
            }
          },
          "frozen": {
            "min_age": "TODO_DPIA_SECTION_6_FROZEN_AFTER_DAYS",
            "actions": {
              "searchable_snapshot": { "snapshot_repository": "hcx-audit-snapshots" }
            }
          },
          "delete": {
            "min_age": "TODO_DPIA_SECTION_6_RETENTION_DAYS",
            "actions": {
              "delete": {}
            }
          }
        }
      }
    }
---
# Index template that will bind the ILM policy above to the hcx_audit
# index pattern. Activated only after DPIA §6 values are set; until then
# the gateway writes to hcx_audit unmanaged.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hcx-audit-index-template
  namespace: hcx-egypt-prod
data:
  hcx-audit-index-template.json: |
    {
      "index_patterns": ["hcx_audit*"],
      "template": {
        "settings": {
          "index.lifecycle.name": "hcx-audit-ilm-policy",
          "index.lifecycle.rollover_alias": "hcx_audit",
          "number_of_shards": 3,
          "number_of_replicas": 1
        }
      },
      "priority": 200
    }
