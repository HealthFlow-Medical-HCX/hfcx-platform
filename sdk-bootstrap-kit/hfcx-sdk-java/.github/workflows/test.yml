name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build, test, install
        # `install` (not `verify`) so siblings can resolve via the local
        # ~/.m2 cache for the BootstrapSmoke step below.
        run: mvn -B clean install

      - name: Run BootstrapSmoke
        # Sprint J1 acceptance criterion — prove that a runnable
        # main-class consumer of the SDK round-trips a JWE successfully.
        # The `-pl hfcx-sdk-examples -am` invocation makes Maven
        # resolve the sibling JARs from the local install above.
        run: |
          mvn -B -pl hfcx-sdk-examples exec:java \
            -Dexec.mainClass=eg.gov.healthflow.hfcx.sdk.examples.BootstrapSmoke \
            -Dexec.classpathScope=compile

      - name: Block embedded private keys
        # Mirrors the platform repo's V1 v1.4 guard.
        run: |
          set -euo pipefail
          HITS=$(grep -rEn "MIIE[A-Za-z0-9+/]{40,}" \
            --include="*.yml" --include="*.yaml" --include="*.properties" \
            --include="*.java" --include="*.scala" --include="*.json" \
            . 2>/dev/null | grep -v "kept intentionally" || true)
          if [[ -n "$HITS" ]]; then
            echo "::error::Embedded private keys detected:"
            echo "$HITS"
            exit 1
          fi
