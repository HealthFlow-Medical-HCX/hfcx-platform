name: HCX API-Gateway - Build

on:
  workflow_dispatch

#    tags:
#      - *

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven Build
        run: |
          cd hcx-core
          mvn clean install
          cd ../api-gateway
          mvn clean install         

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set the Image TAG
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and push Docker image for API-Gateway
        uses: docker/build-push-action@v3
        with:
          context: ./api-gateway
          push: true
          tags: healthflow/api-gateway:${{ env.IMAGE_TAG }}_${{ github.run_number }}
          labels: api-gateway image

      - name: Trivy image scan — api-gateway
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: healthflow/api-gateway:${{ env.IMAGE_TAG }}_${{ github.run_number }}
          format: sarif
          output: trivy-api-gateway.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF — api-gateway
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api-gateway.sarif
          category: trivy-image-api-gateway

      - name: Configure AWS CLI
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # P0-1 follow-up: was hardcoded ap-south-1 (Mumbai). Defaults to
          # me-south-1 (Bahrain) — closest GA AWS region to Egypt — and is
          # overridable via the AWS_REGION repository variable.
          aws-region: ${{ vars.AWS_REGION || 'me-south-1' }}
