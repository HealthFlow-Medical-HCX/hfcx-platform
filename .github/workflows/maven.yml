name: Build
on:
  push:
    branches:
      - main
      - sprint-*
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      # Gap N2 v1.3 — produce fhir/egyptian-ig/output/package.tgz so the
      # hcx-apis maven-antrun step can bundle it into the runtime classpath.
      # Without this, mvn -B verify fails with the documented error.
      - name: Set up Node.js (for SUSHI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Egyptian FHIR IG
        run: bash tools/build-fhir-ig.sh
      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
