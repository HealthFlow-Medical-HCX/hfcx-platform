name: HCX Platform - Build

on:
  workflow_dispatch

#    tags:
#      - *

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: 11

      - name: Cache Maven dependencies
        uses: actions/cache@v2
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Maven Build
        run: |
          mvn clean install
          cd hcx-scheduler-jobs
          mvn clean install
          cd ../hcx-pipeline-jobs
          mvn clean install -DskipTests
          cd ../hcx-onboard
          mvn clean install

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set the Image TAG
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and push Docker image for API-Gateway
        uses: docker/build-push-action@v3
        with:
          context: ./api-gateway
          push: true
          tags: healthflow/api-gateway:${{ env.IMAGE_TAG }}_${{ github.run_number }}
          labels: api-gateway image

      - name: Build and push Docker image for HCX-APIs
        uses: docker/build-push-action@v3
        with:
          context: ./hcx-apis
          push: true
          tags: healthflow/hcx-api:${{ env.IMAGE_TAG }}_${{ github.run_number }}
          labels: hcx-api image

      - name: Build and push Docker image for HCX-Onboard
        uses: docker/build-push-action@v3
        with:
          context: ./hcx-onboard
          push: true
          tags: healthflow/hcx-onboard:${{ env.IMAGE_TAG }}_${{ github.run_number }}
          labels: hcx-onboard image

      - name: Build and push Docker image for HCX Scheduler Jobs
        uses: docker/build-push-action@v3
        with:
          context: ./hcx-scheduler-jobs
          push: true
          tags: healthflow/hcx-scheduler-jobs:${{ env.IMAGE_TAG }}_${{ github.run_number }}
          labels: hcx-scheduler-jobs image

      - name: Build and push Docker image for HCX Pipeline Jobs
        uses: docker/build-push-action@v3
        with:
          context: ./hcx-pipeline-jobs/jobs-distribution
          push: true
          tags: healthflow/hcx-pipeline-jobs:${{ env.IMAGE_TAG }}_${{ github.run_number }}
          labels: hcx-pipeline-jobs image

      # Trivy image scans — fan out across all 5 images. Each job uploads a
      # distinct SARIF category so findings on one image are not double-counted
      # against another. matrix would be nicer but this workflow already had
      # 5 explicit build steps; keeping the same shape for easier diffing.
      - name: Trivy image scan — api-gateway
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: healthflow/api-gateway:${{ env.IMAGE_TAG }}_${{ github.run_number }}
          format: sarif
          output: trivy-api-gateway.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
      - name: Upload Trivy SARIF — api-gateway
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api-gateway.sarif
          category: trivy-image-api-gateway

      - name: Trivy image scan — hcx-api
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: healthflow/hcx-api:${{ env.IMAGE_TAG }}_${{ github.run_number }}
          format: sarif
          output: trivy-hcx-api.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
      - name: Upload Trivy SARIF — hcx-api
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-hcx-api.sarif
          category: trivy-image-hcx-api

      - name: Trivy image scan — hcx-onboard
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: healthflow/hcx-onboard:${{ env.IMAGE_TAG }}_${{ github.run_number }}
          format: sarif
          output: trivy-hcx-onboard.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
      - name: Upload Trivy SARIF — hcx-onboard
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-hcx-onboard.sarif
          category: trivy-image-hcx-onboard

      - name: Trivy image scan — hcx-scheduler-jobs
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: healthflow/hcx-scheduler-jobs:${{ env.IMAGE_TAG }}_${{ github.run_number }}
          format: sarif
          output: trivy-hcx-scheduler-jobs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
      - name: Upload Trivy SARIF — hcx-scheduler-jobs
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-hcx-scheduler-jobs.sarif
          category: trivy-image-hcx-scheduler-jobs

      - name: Trivy image scan — hcx-pipeline-jobs
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: healthflow/hcx-pipeline-jobs:${{ env.IMAGE_TAG }}_${{ github.run_number }}
          format: sarif
          output: trivy-hcx-pipeline-jobs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
      - name: Upload Trivy SARIF — hcx-pipeline-jobs
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-hcx-pipeline-jobs.sarif
          category: trivy-image-hcx-pipeline-jobs

      - name: Configure AWS CLI
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # P0-1 follow-up: was hardcoded ap-south-1 (Mumbai). Defaults to
          # me-south-1 (Bahrain) — closest GA AWS region to Egypt — and is
          # overridable via the AWS_REGION repository variable.
          aws-region: ${{ vars.AWS_REGION || 'me-south-1' }}

      - name: Build and push Docker image for HCX Scheduler Job to S3 bucket
        run: |
          echo ${{ env.IMAGE_TAG }}_${{ github.run_number }} >> /tmp/tag.txt
          aws s3 cp /tmp/tag.txt s3://build-tags/tag.txt